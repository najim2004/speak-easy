<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="../../../static/js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="js/notification-sidebar.js"></script>
  </head>
  <body class="dark min-h-screen bg-black/40 font-inter text-white">
    <main class="flex min-h-screen justify-end bg-black/40 backdrop-blur-sm">
      <aside class="flex h-screen w-full max-w-sm flex-col bg-[#0a0a0a] p-8 shadow-2xl sm:max-w-md">
        <div class="mb-8 flex items-center justify-between">
          <h1 class="flex items-center gap-3 text-xl font-black text-brand-accent"><i class="fa-solid fa-bell"></i> Notifications & Tasks</h1>
          <button type="button" data-close-notification class="grid h-10 w-10 place-items-center rounded-xl border border-white/10 transition hover:bg-white/5" aria-label="Close notifications"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 space-y-4 overflow-y-auto pr-2">
          <article class="rounded-2xl border border-[#222] bg-[#111] p-4 transition hover:border-brand-accent/40">
            <div class="mb-3 flex items-center gap-3"><span class="grid h-9 w-9 place-items-center rounded-lg bg-brand-accent/10 text-brand-accent"><i class="fa-solid fa-file-lines"></i></span><span class="text-[10px] font-black uppercase tracking-widest text-brand-accent">Homework</span></div>
            <h2 class="text-sm font-black leading-tight">Assignment #04: Kanji Writing</h2>
            <p class="mt-2 flex items-center gap-2 text-[10px] font-semibold text-gray-500"><i class="fa-solid fa-clock"></i> Deadline: <span class="font-black text-rose-500">Today, 11:59 PM</span></p>
          </article>
          <article class="rounded-2xl border border-[#222] bg-[#111] p-4 transition hover:border-brand-accent/40">
            <div class="mb-3 flex items-center gap-3"><span class="grid h-9 w-9 place-items-center rounded-lg bg-brand-accent/10 text-brand-accent"><i class="fa-solid fa-clipboard-check"></i></span><span class="text-[10px] font-black uppercase tracking-widest text-brand-accent">Quiz</span></div>
            <h2 class="text-sm font-black leading-tight">N5 Weekly Vocabulary Quiz</h2>
            <p class="mt-2 flex items-center gap-2 text-[10px] font-semibold text-gray-500"><i class="fa-solid fa-clock"></i> Deadline: <span class="font-black text-rose-500">Tomorrow, 08:00 PM</span></p>
          </article>
          <article class="rounded-2xl border border-[#222] bg-[#111] p-4 transition hover:border-brand-accent/40">
            <div class="mb-3 flex items-center gap-3"><span class="grid h-9 w-9 place-items-center rounded-lg bg-brand-accent/10 text-brand-accent"><i class="fa-solid fa-trophy"></i></span><span class="text-[10px] font-black uppercase tracking-widest text-brand-accent">Mock Test</span></div>
            <h2 class="text-sm font-black leading-tight">Monthly Mock Test - October</h2>
            <p class="mt-2 flex items-center gap-2 text-[10px] font-semibold text-gray-500"><i class="fa-solid fa-clock"></i> Deadline: <span class="font-black text-rose-500">Oct 25, 10:00 AM</span></p>
          </article>
        </div>
      </aside>
    </main>
  </body>
</html>
