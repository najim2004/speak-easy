<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Left Sidebar | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="../../../static/js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="js/dashboard-common.js"></script>
    <script defer src="js/left-sidebar.js"></script>
  </head>
  <body class="dark min-h-screen bg-[#0a0a0a] font-inter text-white">
    <main class="flex min-h-screen">
      <aside class="flex w-72 flex-col border-r border-[#1a1a1a] bg-black">
        <div class="flex h-full flex-col p-6">
          <div class="mb-8 flex items-center justify-between">
            <a href="overview.html" class="flex items-center gap-3">
              <span class="grid h-10 w-10 place-items-center rounded-xl bg-brand-accent text-black shadow-lg"><i class="fa-solid fa-book-open"></i></span>
              <span class="text-xl font-black uppercase tracking-tight">LearnJapan</span>
            </a>
          </div>

          <div class="relative mb-8">
            <button type="button" data-course-toggle aria-expanded="false" class="flex w-full items-center justify-between gap-3 rounded-2xl border border-[#222] bg-[#111] px-4 py-3 text-left transition hover:border-brand-accent/50">
              <span class="min-w-0">
                <span class="mb-1 block text-[10px] font-black uppercase leading-none tracking-wider text-brand-accent">Switch Batch</span>
                <span class="block truncate text-sm font-bold">Japanese N5 Beginner Course</span>
              </span>
              <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
            </button>
            <div data-course-menu class="absolute left-0 top-full z-50 mt-2 hidden w-full overflow-hidden rounded-2xl border border-[#333] bg-[#1a1a1a] shadow-2xl">
              <button class="w-full border-l-4 border-brand-accent border-b border-[#222] p-4 text-left"><span class="block text-xs font-bold">Japanese N5 Beginner Course</span><span class="mt-1 block text-[10px] font-semibold text-gray-500">Tokyo 2026</span></button>
              <button class="w-full border-b border-[#222] p-4 text-left hover:bg-white/5"><span class="block text-xs font-bold">Japanese N4 Intermediate Course</span><span class="mt-1 block text-[10px] font-semibold text-gray-500">Osaka 2026</span></button>
            </div>
          </div>

          <nav class="flex-1 space-y-1 overflow-y-auto pr-1">
            <a href="overview.html" class="flex items-center gap-4 rounded-xl bg-brand-accent px-4 py-3 text-sm font-bold text-black shadow-md"><i class="fa-solid fa-table-columns w-5"></i><span>Overview</span></a>
            <a href="attendance.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-clock-rotate-left w-5"></i><span>Attendance</span></a>
            <a href="class-routine.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-calendar-days w-5"></i><span>Class Routine</span></a>
            <a href="recordings.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-video w-5"></i><span>Recordings</span></a>
            <a href="performance.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-arrow-trend-up w-5"></i><span>Performance</span></a>
            <a href="leaderboard.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-trophy w-5"></i><span>Leaderboard</span></a>
          </nav>

          <div class="space-y-1 border-t border-[#1a1a1a] pt-4">
            <a href="settings.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-gray-500 transition hover:bg-gray-500/10"><i class="fa-solid fa-gear w-5"></i><span>Settings</span></a>
            <a href="../signin.html" class="flex items-center gap-4 rounded-xl px-4 py-3 text-sm font-bold text-rose-500 transition hover:bg-rose-500/10"><i class="fa-solid fa-right-from-bracket w-5"></i><span>Sign Out</span></a>
          </div>
        </div>
      </aside>
      <section class="hidden flex-1 items-center justify-center p-10 lg:flex">
        <div class="max-w-md rounded-3xl border border-[#2a2a2a] bg-[#1a1a1a] p-8">
          <p class="text-[10px] font-black uppercase tracking-[0.2em] text-brand-accent">Sidebar Component</p>
          <h1 class="mt-3 text-3xl font-black">Dashboard navigation</h1>
          <p class="mt-3 text-sm font-semibold text-gray-500">Use this file as the standalone left sidebar reference for all dashboard pages.</p>
        </div>
      </section>
    </main>
  </body>
</html>
