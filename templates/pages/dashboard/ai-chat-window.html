<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensei AI | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="../../../static/js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="js/ai-chat-window.js"></script>
  </head>
  <body class="dark min-h-screen bg-[#0a0a0a] font-inter text-white">
    <main class="grid min-h-screen place-items-center p-4">
      <section class="flex h-[480px] w-full max-w-sm flex-col overflow-hidden rounded-3xl border border-[#2a2a2a] bg-[#1a1a1a] shadow-2xl sm:max-w-md">
        <header class="flex items-center justify-between bg-brand-accent p-4 text-black">
          <div class="flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="text-sm font-black uppercase tracking-widest">Sensei AI</span></div>
          <a href="overview.html" class="grid h-8 w-8 place-items-center rounded-lg transition hover:bg-black/10" aria-label="Close Sensei AI"><i class="fa-solid fa-xmark"></i></a>
        </header>
        <div data-ai-chat-log class="flex-1 space-y-4 overflow-y-auto p-4">
          <div class="flex justify-start">
            <div class="max-w-[80%] rounded-2xl rounded-tl-none border border-white/5 bg-[#2a2a2a] p-3 text-sm font-bold text-white shadow-sm">Konnichiwa! I am your Japanese assistant. How can I help?</div>
          </div>
        </div>
        <div data-ai-typing class="hidden px-4 pb-2 text-xs font-black text-gray-500">Sensei is thinking...</div>
        <footer class="border-t border-white/10 p-3">
          <div class="flex gap-2 rounded-2xl bg-gray-500/10 p-1">
            <input data-ai-chat-input type="text" placeholder="Ask Sensei..." class="min-w-0 flex-1 border-none bg-transparent px-3 py-2 text-sm font-bold outline-none placeholder:text-gray-500" />
            <button type="button" data-ai-chat-send class="grid h-10 w-10 place-items-center rounded-xl bg-brand-accent text-black transition hover:scale-105 active:scale-95" aria-label="Send message"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
